[project]
name = "synqt-pygments"
version = "0.2.0"
description = "Pygments lexers for the SynQt docs: the .syn contract language, the QML code blocks, and the synqt CLI reference listings."
requires-python = ">=3.9"
dependencies = ["pygments>=2.17"]

[project.entry-points."pygments.lexers"]
synqtcontract = "synqt_pygments.lexers:SynLexer"
synqtcli = "synqt_pygments.lexers:CliLexer"
synqtqml = "synqt_pygments.lexers:SynqtQmlLexer"

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
