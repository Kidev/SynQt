<!--
  Doxygen HTML header for the SynQt C++ runtime reference.

  It replaces Doxygen's stock header to do three things the stock one cannot: load the
  doxygen-awesome extensions (copy button, paragraph links, interactive table of
  contents, tabs), pin the page to dark mode with `class="dark-mode"` so the reference
  matches the dark-only documentation site, and carry that site's header menu across the
  top so the reference is part of the site rather than a differently shaped island in it.

  The menu is a static copy of what MkDocs Material renders for the same six entries
  (mkdocs.yml `nav`), because the reference is generated by Doxygen and never sees the
  MkDocs template. Its markup is deliberately the same class names, so the rules that
  style it in doxygen-synqt.css read against the site's own CSS. Adding, removing, or
  renaming a top-level `nav` entry means changing the list below to match.

  The `$name` tokens are Doxygen substitutions; do not rename them. Regenerate the stock
  header to compare against a new Doxygen release with:
      doxygen -w html header.html footer.html stylesheet.css Doxyfile
-->

<!-- Fill the repository facts (latest version, stars, forks) from the GitHub API, cached in
     localStorage so a normal browsing session hits the API at most a few times, and degrade
     to just the mark and name if the request is blocked or rate limited. This mirrors what
     MkDocs Material does for the same widget on the rest of the site. -->
<script type="text/javascript">
(function () {
    "use strict";
    var repository = "Kidev/SynQt";
    var factsElement = document.getElementById("synqt-source-facts");
    if (!factsElement) {
        return;
    }
    function abbreviate(count) {
        // Match MkDocs Material's fact formatting: thousands become "1.2k", ten-thousands
        // and up drop the decimal ("23k"), so the two widgets read identically at any size.
        if (count >= 10000) {
            return Math.round(count / 1000) + "k";
        }
        if (count >= 1000) {
            return (Math.round(count / 100) / 10) + "k";
        }
        return String(count);
    }
    function render(facts) {
        if (!facts) {
            return;
        }
        var items = [];
        if (facts.version) {
            items.push('<li class="md-source__fact md-source__fact--version">' + facts.version + '</li>');
        }
        if (typeof facts.stars === "number") {
            items.push('<li class="md-source__fact md-source__fact--stars">' + abbreviate(facts.stars) + '</li>');
        }
        if (typeof facts.forks === "number") {
            items.push('<li class="md-source__fact md-source__fact--forks">' + abbreviate(facts.forks) + '</li>');
        }
        if (items.length) {
            factsElement.innerHTML = items.join("");
            factsElement.hidden = false;
        }
    }
    var cacheKey = "synqt-source-facts";
    var cacheTtl = 15 * 60 * 1000;
    try {
        var cached = JSON.parse(window.localStorage.getItem(cacheKey) || "null");
        if (cached && (Date.now() - cached.time) < cacheTtl) {
            render(cached.facts);
            return;
        }
    } catch (ignored) {
        // A blocked or unavailable localStorage is not fatal; fall through to a live fetch.
    }
    var facts = { version: null, stars: null, forks: null };
    function save() {
        try {
            window.localStorage.setItem(cacheKey, JSON.stringify({ time: Date.now(), facts: facts }));
        } catch (ignored) {
            // Ignore quota or privacy-mode errors: the facts still render for this page load.
        }
        render(facts);
    }
    fetch("https://api.github.com/repos/" + repository)
        .then(function (response) { return response.ok ? response.json() : null; })
        .then(function (json) {
            if (json) {
                facts.stars = json.stargazers_count;
                facts.forks = json.forks_count;
            }
            return fetch("https://api.github.com/repos/" + repository + "/releases/latest");
        })
        .then(function (response) { return (response && response.ok) ? response.json() : null; })
        .then(function (json) {
            if (json && json.tag_name) {
                facts.version = json.tag_name;
            }
            save();
        })
        .catch(function () { render(facts); });
})();
</script>
