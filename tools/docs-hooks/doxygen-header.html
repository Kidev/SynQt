<!--
  Doxygen HTML header for the SynQt C++ runtime reference.

  It replaces Doxygen's stock header to do three things the stock one cannot: load the
  doxygen-awesome extensions (copy button, paragraph links, interactive table of
  contents, tabs), pin the page to dark mode with `class="dark-mode"` so the reference
  matches the dark-only documentation site, and put a link back to that site in the
  title bar so the reference is never a dead end.

  The `$name` tokens are Doxygen substitutions; do not rename them. Regenerate the stock
  header to compare against a new Doxygen release with:
      doxygen -w html header.html footer.html stylesheet.css Doxyfile
-->
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml" class="dark-mode">
<head>
<meta http-equiv="Content-Type" content="text/xhtml;charset=UTF-8"/>
<meta http-equiv="X-UA-Compatible" content="IE=11"/>
<meta name="generator" content="Doxygen $doxygenversion"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<!--BEGIN PROJECT_NAME--><title>$projectname: $title</title><!--END PROJECT_NAME-->
<!--BEGIN !PROJECT_NAME--><title>$title</title><!--END !PROJECT_NAME-->
<link rel="icon" type="image/svg+xml" href="$relpath^synqt.svg"/>
<link href="$relpath^tabs.css" rel="stylesheet" type="text/css"/>
<script type="text/javascript" src="$relpath^jquery.js"></script>
<script type="text/javascript" src="$relpath^dynsections.js"></script>
<script type="text/javascript" src="$relpath^doxygen-awesome-fragment-copy-button.js"></script>
<script type="text/javascript" src="$relpath^doxygen-awesome-paragraph-link.js"></script>
<script type="text/javascript" src="$relpath^doxygen-awesome-interactive-toc.js"></script>
<script type="text/javascript" src="$relpath^doxygen-awesome-tabs.js"></script>
<script type="text/javascript">
    DoxygenAwesomeFragmentCopyButton.init()
    DoxygenAwesomeParagraphLink.init()
    DoxygenAwesomeInteractiveToc.init()
    DoxygenAwesomeTabs.init()
</script>
$treeview
$search
$mathjax
<link href="$relpath^$stylesheet" rel="stylesheet" type="text/css" />
$extrastylesheet
</head>
<body>
<div id="top"><!-- do not remove this div, it is closed by doxygen! -->

<!--BEGIN TITLEAREA-->
<div id="titlearea">
<table cellspacing="0" cellpadding="0">
 <tbody>
 <tr id="projectrow">
  <!--BEGIN PROJECT_LOGO-->
  <td id="projectlogo"><img alt="SynQt" src="$relpath^$projectlogo"/></td>
  <!--END PROJECT_LOGO-->
  <!--BEGIN PROJECT_NAME-->
  <td id="projectalign">
   <div id="projectname"><a href="/">$projectname</a>
   <!--BEGIN PROJECT_NUMBER-->&#160;<span id="projectnumber">$projectnumber</span><!--END PROJECT_NUMBER-->
   </div>
   <!--BEGIN PROJECT_BRIEF--><div id="projectbrief">$projectbrief</div><!--END PROJECT_BRIEF-->
  </td>
  <!--END PROJECT_NAME-->
 </tr>
 <!-- The two ways back out of the reference. Doxygen has no notion of a parent site, so
      without these the generated pages are a dead end. -->
 <tr><td colspan="2" id="synqt-backlink">
   <a href="/api-reference/" title="The page that introduces this reference">Documentation</a>
   <a href="/">synqt.org</a>
   <a href="https://github.com/Kidev/SynQt">GitHub</a>
 </td></tr>
 <!-- Emitted unconditionally, not gated on DISABLE_INDEX as Doxygen's stock header does:
      the sidebar-only layout hides the tab bar Doxygen would otherwise put search in, so
      gating it there makes the search box vanish entirely. -->
 <!--BEGIN SEARCHENGINE-->
 <tr><td colspan="2" id="synqt-search">$searchbox</td></tr>
 <!--END SEARCHENGINE-->
 </tbody>
</table>
</div>
<!--END TITLEAREA-->
<!-- end header part -->
