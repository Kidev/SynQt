<!--
  Doxygen HTML header for the SynQt C++ runtime reference.

  It replaces Doxygen's stock header to do three things the stock one cannot: load the
  doxygen-awesome extensions (copy button, paragraph links, interactive table of
  contents, tabs), pin the page to dark mode with `class="dark-mode"` so the reference
  matches the dark-only documentation site, and carry that site's header menu across the
  top so the reference is part of the site rather than a differently shaped island in it.

  The menu is a static copy of what MkDocs Material renders for the same six entries
  (mkdocs.yml `nav`), because the reference is generated by Doxygen and never sees the
  MkDocs template. Its markup is deliberately the same class names, so the rules that
  style it in doxygen-synqt.css read against the site's own CSS. Adding, removing, or
  renaming a top-level `nav` entry means changing the list below to match.

  The `$name` tokens are Doxygen substitutions; do not rename them. Regenerate the stock
  header to compare against a new Doxygen release with:
      doxygen -w html header.html footer.html stylesheet.css Doxyfile
-->
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml" class="dark-mode">
<head>
<meta http-equiv="Content-Type" content="text/xhtml;charset=UTF-8"/>
<meta http-equiv="X-UA-Compatible" content="IE=11"/>
<meta name="generator" content="Doxygen $doxygenversion"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<!-- The same shape of title the documentation site gives its pages: the page, then
     the project. Doxygen would otherwise emit "$projectname: $title". -->
<title>$title - SynQt</title>
<link rel="icon" type="image/svg+xml" href="$relpath^synqt.svg"/>
<!-- The same Roboto the documentation site loads, so the header menu here is set in the
     same face rather than in a system font that happens to sit next to it. -->
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="crossorigin"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Roboto:300,300i,400,400i,700,700i%7CRoboto+Mono:400,400i,700,700i&amp;display=fallback"/>
<link href="$relpath^tabs.css" rel="stylesheet" type="text/css"/>
<script type="text/javascript" src="$relpath^jquery.js"></script>
<script type="text/javascript" src="$relpath^dynsections.js"></script>
<script type="text/javascript" src="$relpath^doxygen-awesome-fragment-copy-button.js"></script>
<script type="text/javascript" src="$relpath^doxygen-awesome-paragraph-link.js"></script>
<script type="text/javascript" src="$relpath^doxygen-awesome-interactive-toc.js"></script>
<script type="text/javascript" src="$relpath^doxygen-awesome-tabs.js"></script>
<script type="text/javascript">
    DoxygenAwesomeFragmentCopyButton.init()
    DoxygenAwesomeParagraphLink.init()
    DoxygenAwesomeInteractiveToc.init()
    DoxygenAwesomeTabs.init()
</script>
$treeview
$search
$mathjax
<link href="$relpath^$stylesheet" rel="stylesheet" type="text/css" />
$extrastylesheet
</head>
<body>

<!-- The documentation site's header menu. Static: see the note at the top of this file. -->
<header class="md-header" id="synqt-sitebar">
 <nav class="md-header__inner" aria-label="Header">
  <a href="/" title="SynQt" class="md-header__button md-logo" aria-label="SynQt">
   <img src="$relpath^synqt.svg" alt="SynQt"/>
  </a>
  <nav class="md-tabs" aria-label="Tabs">
   <ul class="md-tabs__list">
    <li class="md-tabs__item"><a href="/" class="md-tabs__link">Home</a></li>
    <li class="md-tabs__item"><a href="/getting-started/" class="md-tabs__link">Tutorials</a></li>
    <li class="md-tabs__item"><a href="/architecture/" class="md-tabs__link">Framework</a></li>
    <li class="md-tabs__item"><a href="/development/" class="md-tabs__link">Contributing</a></li>
    <li class="md-tabs__item md-tabs__item--active"><a href="/api/" class="md-tabs__link">C++ reference</a></li>
    <li class="md-tabs__item"><a href="https://get.synqt.org/" class="md-tabs__link">Download</a></li>
   </ul>
  </nav>
  <a href="https://github.com/Kidev/SynQt" class="md-header__source" title="Kidev/SynQt">Kidev/SynQt</a>
 </nav>
</header>

<div id="side-nav" class="ui-resizable side-nav-resizable"><!-- do not remove this div, it is closed by doxygen! -->
<!--END FULL_SIDEBAR-->

<div id="top"><!-- do not remove this div, it is closed by doxygen! -->

<!--BEGIN TITLEAREA-->
<div id="titlearea">
<!-- The head of the sidebar. The wordmark and the way back out of the reference are in
     the site header above, so what belongs here is the one thing the sidebar owns: the
     search box, which Doxygen emits here in this layout (DISABLE_INDEX = YES with
     FULL_SIDEBAR = YES) rather than into a tab bar. -->
<div id="synqt-sidebar-head">
 <div id="synqt-sidebar-title">C++ runtime reference</div>
 $searchbox
</div>
</div>
<!--END TITLEAREA-->
