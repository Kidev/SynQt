<!--
  Doxygen HTML footer for the SynQt C++ runtime reference.

  It replaces the stock footer, whose entire content is a "Generated by doxygen <version>"

  reference needs, and the tool that produced the pages is already named on the page that
  introduces them (docs/api-reference.md). What replaces it is the one thing a footer here
  can usefully carry: the license, and the way back to the rest of the documentation.

  The `$` tokens are Doxygen substitutions; do not rename them. Regenerate the stock footer
  to compare against a new Doxygen release with:
      doxygen -w html header.html footer.html stylesheet.css Doxyfile
-->
