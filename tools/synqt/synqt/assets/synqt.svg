<svg xmlns="http://www.w3.org/2000/svg" viewBox="190 42 284 150" width="284" height="150" role="img" aria-label="SynQt logo (light)">
  <title>SynQt</title>
  <!-- Reversed variant of synqt.svg for the places the logo sits on a colored
       or dark background instead of a light one: the site header (always the
       indigo primary color, see overrides/partials/header.html) and the home
       page hero (docs/index.md, a dark gradient, see docs/stylesheets/home.css).
       Only the dark teal #00414a half is swapped, here to white, since that is
       the half that loses its contrast on both; the green half already reads
       fine there. Keep this in sync with synqt.svg (same outlined coordinates;
       see that file for why the wordmark is outlined rather than live text). -->
  <defs>
    <path id="hexFrag" d="M -13.86,-8 L 0,-16 L 13.86,-8 L 13.86,8"/>
  </defs>
  
  <g class="motion" fill="none" stroke="#46F477" stroke-width="3" stroke-linecap="round" stroke-linejoin="square" transform="translate(255,125) scale(-1.35) rotate(30)">
    <use href="#hexFrag">
      <animateTransform attributeName="transform" type="scale" values="1;2.4" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0.8;0" dur="2s" repeatCount="indefinite"/>
    </use>
    <use href="#hexFrag">
      <animateTransform attributeName="transform" type="scale" values="1;2.4" begin="-0.67s" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0.8;0" begin="-0.67s" dur="2s" repeatCount="indefinite"/>
    </use>
    <use href="#hexFrag">
      <animateTransform attributeName="transform" type="scale" values="1;2.4" begin="-1.33s" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0.8;0" begin="-1.33s" dur="2s" repeatCount="indefinite"/>
    </use>
  </g>
  
  <g class="motion" fill="none" stroke="#00a6ed" stroke-width="3" stroke-linecap="round" stroke-linejoin="square" transform="translate(408,109) scale(1.35) rotate(30)">
    <use href="#hexFrag">
      <animateTransform attributeName="transform" type="scale" values="1;2.4" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0.8;0" dur="2s" repeatCount="indefinite"/>
    </use>
    <use href="#hexFrag">
      <animateTransform attributeName="transform" type="scale" values="1;2.4" begin="-0.67s" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0.8;0" begin="-0.67s" dur="2s" repeatCount="indefinite"/>
    </use>
    <use href="#hexFrag">
      <animateTransform attributeName="transform" type="scale" values="1;2.4" begin="-1.33s" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0.8;0" begin="-1.33s" dur="2s" repeatCount="indefinite"/>
    </use>
  </g>
  
