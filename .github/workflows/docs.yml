name: Deploy docs to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissions the official Pages deployment needs.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; do not cancel a run in progress.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0          # full history, in case theme features use git dates

      - uses: actions/setup-python@v6.3.0
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      # The C++ runtime reference under /api/ is generated by the MkDocs hook in
      # tools/docs-hooks/doxygen.py. Without these the site still builds, but with the
      # reference missing; Graphviz supplies the inheritance diagrams.
      - name: Install Doxygen and Graphviz
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends doxygen graphviz

      - name: Build site
        env:
          # Silences the mkdocs-material package's startup nag about MkDocs 2.0;
          # it prints on every invocation of the mkdocs binary regardless of project.
          NO_MKDOCS_2_WARNING: "true"
        run: mkdocs build --site-dir _site

      - uses: actions/upload-pages-artifact@v5.0.0
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5.0.0
