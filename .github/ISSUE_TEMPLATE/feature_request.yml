name: Feature request
description: Propose something SynQt should be able to do and currently cannot.
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: What you are trying to do
      description: >-
        The problem, not the solution. What are you building, and where does SynQt stop
        you? A proposal is much easier to judge against the thing it is meant to solve.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: What you would like
      description: How you imagine it working. QML or config sketches are welcome.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: What you tried instead
      description: >-
        Whether an existing mechanism nearly does it (a custom provider, an extra entity, a
        connect point shaped differently), and where it falls short.
    validations:
      required: false

  - type: checkboxes
    id: boundaries
    attributes:
      label: Trust boundaries
      description: >-
        SynQt's security model is deny by default, and the client is never trusted. A
        proposal that needs one of these relaxed is not out of the question, but it has to
        be argued rather than assumed.
      options:
        - label: This works without the browser client reaching anything but its web edge.
        - label: This works without a secret or credential reaching the client.
        - label: This works without an owner trusting a value the caller supplied.
