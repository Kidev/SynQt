# The gavel auction, the finished three-entity system from docs/tutorial.md: a browser
# client, a web edge that serves the app and owns the live auction, and a database that
# holds the durable Hall of Fame the browser reaches only through the edge.
project:
  name: gavel
  version: 0.1.0
  qt_version: 6.11.1
  origin_model: same_origin

scopes:
  order: [anonymous, user, moderator, admin]
  hierarchical: true
  default: anonymous

security:
  allowed_origins: [self]
  cross_origin_isolation: false

build:
  client_threads: single

# GitHub sign in (docs/tutorial-sign-in.md). The client_id is public; the client secret
# lives only in web/.env (never here, never anywhere the browser can reach).
identity:
  providers:
    - name: github
      client_id: your-client-id-from-github
      client_secret: env:GITHUB_CLIENT_SECRET
  mapping: web/identity/map.qml

entities:
  - name: client
    kind: client
    targets: [wasm]

  - name: web
    kind: service
    capability: web_edge
    identity: true

  - name: database
    kind: service
    blueprint: persistence

connect_points:
  # The live auction: the edge is the single authority; the browser may watch and bid.
  # per_session so each request carries its Caller (the signed-in user the edge authorizes).
  - name: auction
    contract: Auction
    owner: web
    consumers: [client]
    server: web/Auction.qml
    instance: per_session

  # The Hall of Fame the browser sees: owned by the edge, filled from the database.
  - name: hall
    contract: Hall
    owner: web
    consumers: [client]
    server: web/Hall.qml
    instance: shared

  # The durable ledger: owned by the database, reachable only by the edge (never the
  # browser; a client consumer here fails `synqt check`, since the database is not a
  # web edge).
  - name: ledger
    contract: Ledger
    owner: database
    consumers: [web]
    server: database/Ledger.qml
    instance: per_peer
